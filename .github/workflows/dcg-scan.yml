name: dcg-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dcg-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: dcg scan
        uses: Dicklesworthstone/destructive_command_guard/action@v0.6.5
        with:
          paths: .
          fail-on: error
          format: json
          comment-on-pr: true
